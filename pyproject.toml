# Tool configuration only. Code Tribunal is distributed as OCI images and CI
# templates; ai-review/src is an internal container implementation, not a
# supported Python distribution.

[tool.pytest.ini_options]
testpaths = ["ai-review/tests"]
pythonpath = ["ai-review/src"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
packages = ["ai_review"]
mypy_path = "ai-review/src"

[[tool.mypy.overrides]]
module = [
  "ai_review.consensus",
  "ai_review.memory",
  "ai_review.render",
  "ai_review.schema",
  "ai_review.anchors",
  "ai_review.gitlab_client",
  "ai_review.gate",
  "ai_review.post",
]
strict = true
