name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dev dependencies
        run: python -m pip install -e '.[dev]'
      - name: Ruff
        run: ruff check ai-review/src ai-review/tests
      - name: Tests with coverage
        run: pytest ai-review/tests --cov=ai_review --cov-report=term-missing
      # Mypy checks the whole ai_review package as a visible non-blocking signal.
      # SPEC-13 currently enables strict mode only for the reducer slice via
      # per-module overrides while later PRs close posting/client typing gaps.
      - name: Mypy strict reality check
        continue-on-error: true
        run: mypy
