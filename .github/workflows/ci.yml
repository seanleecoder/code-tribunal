name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
      - name: Install dev dependencies
        run: python -m pip install -e '.[dev]'
      - name: Ruff
        run: ruff check ai-review/src ai-review/tests
      - name: Tests with coverage
        run: pytest ai-review/tests --cov=ai_review --cov-report=term-missing
      - name: Mypy strict SPEC-13/14 slice
        run: >-
          mypy
          ai-review/src/ai_review/consensus.py
          ai-review/src/ai_review/memory.py
          ai-review/src/ai_review/render.py
          ai-review/src/ai_review/schema.py
          ai-review/src/ai_review/anchors.py
          ai-review/src/ai_review/gitlab_client.py
          ai-review/src/ai_review/gate.py
          ai-review/src/ai_review/post.py
      # Mypy also checks the whole ai_review package as a visible non-blocking signal
      # while remaining package-wide typing debt is closed incrementally.
      - name: Mypy whole-package reality check
        continue-on-error: true
        run: mypy
