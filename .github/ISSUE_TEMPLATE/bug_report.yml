name: Bug report
description: Report a reproducible defect in Code Tribunal
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
    validations:
      required: true
  - type: dropdown
    id: stage
    attributes:
      label: Pipeline stage
      options:
        - prepare
        - review
        - critique
        - consensus
        - post
        - gate
        - unknown
    validations:
      required: true
  - type: dropdown
    id: reviewer
    attributes:
      label: Reviewer
      options:
        - claude
        - codex
        - opencode
        - not reviewer-specific
        - unknown
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Reproduction steps
      description: Include config, command, CI job, pipeline stage, reviewer, and logs where possible.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
