# Canonical Code Tribunal DAG. It can be included directly or combined with
# review-child.gitlab-ci.yml in a protected child trigger. `needs` preserves
# order.

variables:
  # Public GHCR images, cut over from the Phase 5.5 private bootstrap refs.
  # Replace all three values together when bumping to a newer published commit.
  AI_REVIEW_BASE_IMAGE: "ghcr.io/seanleecoder/code-tribunal/ai-review-base:1.0-5a24b557e793447fd41b7244c715a134bc1b9592@sha256:eb8e5d1e9d611f4056216c88a58e10bcb33b758d2fabb7a93b5ddb567d3271b2"
  AI_REVIEW_REVIEWER_IMAGE: "ghcr.io/seanleecoder/code-tribunal/ai-review-reviewer:1.0-5a24b557e793447fd41b7244c715a134bc1b9592@sha256:b43f5a14939d76589cfa790a0f54565468b40a411ed9ebd6a4f08844d984863a"
  AI_REVIEW_TRUSTED_IMAGE_SHA: "5a24b557e793447fd41b7244c715a134bc1b9592"
  AI_REVIEW_TRUSTED_ROOT: /opt/ai-review
  AI_REVIEW_CONFIG: /opt/ai-review/config/review.yaml
  PYTHONPATH: /opt/ai-review/src
  # Single source of truth for critique: this exact variable gates BOTH the
  # critique job-creation rule below and config's critique.enabled (via
  # apply_env_overrides). Default matches review.yaml; set "false" to disable.
  # Must be exactly "true"/"false" — any other value fails the pipeline loudly.
  AI_REVIEW_CRITIQUE_ENABLED: "true"
  # Environment-consistency contract: set AI_REVIEW_* policy overrides as
  # project/group/pipeline variables (inherited by every job). Prepare records
  # effective_config_sha256; consensus fails closed if a later job sees a
  # different effective config. Supported override names:
  # AI_REVIEW_CLAUDE_MODEL AI_REVIEW_CODEX_MODEL AI_REVIEW_OPENCODE_MODEL
  # AI_REVIEW_CURSOR_MODEL AI_REVIEW_CLAUDE_ENABLED AI_REVIEW_CODEX_ENABLED
  # AI_REVIEW_OPENCODE_ENABLED AI_REVIEW_CURSOR_ENABLED AI_REVIEW_CLAUDE_EFFORT
  # AI_REVIEW_CODEX_EFFORT AI_REVIEW_OPENCODE_EFFORT AI_REVIEW_CRITIQUE_ENABLED
  # AI_REVIEW_MERGE_GATE_ENABLED AI_REVIEW_PANEL_GROUPING_SEMANTIC_ENABLED
  # AI_REVIEW_PANEL_GROUPING_SEMANTIC_THRESHOLD AI_REVIEW_POSTING_MODE
  # AI_REVIEW_STATE_BACKEND

.ai_review_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_MERGE_REQUEST_IID'
    - if: '$CI_PIPELINE_SOURCE == "api" && $CI_MERGE_REQUEST_IID'

prepare_ai_review:
  stage: ai_review
  needs: []
  # Entry job for the whole flow: every other job `needs` it, so gating the
  # trigger here gates the entire review. Defaults to auto-run on MRs; set the
  # project/pipeline variable AI_REVIEW_MANUAL="true" to require a human to
  # start the review (non-blocking: un-played leaves the MR mergeable, and the
  # gate still runs once triggered). Use allow_failure: false instead if the
  # review must be mandatory-but-manual (every MR blocked awaiting a click).
  rules:
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline" && $CI_MERGE_REQUEST_ID && $AI_REVIEW_MANUAL == "true"'
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $AI_REVIEW_MANUAL == "true"'
      when: manual
      allow_failure: true
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_MERGE_REQUEST_IID'
    - if: '$CI_PIPELINE_SOURCE == "api" && $CI_MERGE_REQUEST_IID'
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: true
  script:
    - python -m ai_review.input_bundle prepare --config "$AI_REVIEW_CONFIG" --out inputs
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - inputs/

.review_template:
  stage: ai_review
  extends: .ai_review_rules
  # Secret-bearing reviewer jobs must run adapter code and reviewer config from
  # the trusted review image/repository, not from MR-controlled code. Runtime
  # endpoint/model validation is defense in depth, not the trust boundary.
  image: "$AI_REVIEW_REVIEWER_IMAGE"
  interruptible: true
  allow_failure: true
  variables:
    AI_REVIEW_INPUT_DIR: inputs
    AI_REVIEW_OUTPUT_DIR: out
    AI_REVIEW_LOCAL_MOCK: "0"
    OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
    AI_REVIEW_REQUIRE_REAL_OPENROUTER: "1"
  needs:
    - job: prepare_ai_review
      artifacts: true
  script:
    - /opt/ai-review/adapters/run_reviewer.sh "$REVIEWER" review
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - out/findings/
      - out/status/

"AI review: [claude]":
  extends: .review_template
  variables:
    REVIEWER: claude
    AI_REVIEW_REQUIRE_REAL_CLAUDE: "1"
    ANTHROPIC_BASE_URL: https://openrouter.ai/api

"AI review: [codex]":
  extends: .review_template
  variables:
    REVIEWER: codex

"AI review: [opencode]":
  extends: .review_template
  variables:
    REVIEWER: opencode
    AI_REVIEW_REQUIRE_REAL_OPENCODE: "1"

"AI review: [cursor]":
  extends: .review_template
  variables:
    REVIEWER: cursor
    AI_REVIEW_REQUIRE_REAL_CURSOR: "1"

.critique_template:
  stage: ai_review
  image: "$AI_REVIEW_REVIEWER_IMAGE"
  interruptible: true
  allow_failure: true
  variables:
    AI_REVIEW_INPUT_DIR: inputs
    AI_REVIEW_OUTPUT_DIR: out
    AI_REVIEW_LOCAL_MOCK: "0"
    OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
    AI_REVIEW_REQUIRE_REAL_OPENROUTER: "1"
  # Critique gating must combine BOTH the enabled-flag AND the source gate in
  # this one rules: block. A job's own rules: FULLY REPLACES any rules inherited
  # via `extends` (GitLab overrides the array, it does not merge), so we cannot
  # rely on `.ai_review_rules` here — extending it would be silently shadowed.
  # Without the source gate, critique jobs are created on push/tag/schedule
  # pipelines where prepare_ai_review does NOT exist, and their non-optional
  # `needs: prepare_ai_review` fails pipeline creation. Keep these sources in
  # sync with prepare_ai_review / .ai_review_rules. The disabled-guard
  # (when: never) must be first so it wins over the source matches below.
  rules:
    - if: '$AI_REVIEW_CRITIQUE_ENABLED != "true"'
      when: never
    - if: '$CI_PIPELINE_SOURCE == "parent_pipeline"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web" && $CI_MERGE_REQUEST_IID'
    - if: '$CI_PIPELINE_SOURCE == "api" && $CI_MERGE_REQUEST_IID'
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: "AI review: [claude]"
      artifacts: true
      optional: true
    - job: "AI review: [codex]"
      artifacts: true
      optional: true
    - job: "AI review: [opencode]"
      artifacts: true
      optional: true
    - job: "AI review: [cursor]"
      artifacts: true
      optional: true
  script:
    - /opt/ai-review/adapters/run_reviewer.sh "$REVIEWER" critique
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - out/critiques/
      - out/pooled_findings/
      - out/status/

"AI critique: [claude]":
  extends: .critique_template
  variables:
    REVIEWER: claude
    AI_REVIEW_REQUIRE_REAL_CLAUDE: "1"
    ANTHROPIC_BASE_URL: https://openrouter.ai/api

"AI critique: [codex]":
  extends: .critique_template
  variables:
    REVIEWER: codex

"AI critique: [opencode]":
  extends: .critique_template
  variables:
    REVIEWER: opencode
    AI_REVIEW_REQUIRE_REAL_OPENCODE: "1"

"AI critique: [cursor]":
  extends: .critique_template
  variables:
    REVIEWER: cursor
    AI_REVIEW_REQUIRE_REAL_CURSOR: "1"

consensus_ai_review:
  stage: ai_review
  extends: .ai_review_rules
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: true
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: "AI review: [claude]"
      artifacts: true
      optional: true
    - job: "AI review: [codex]"
      artifacts: true
      optional: true
    - job: "AI review: [opencode]"
      artifacts: true
      optional: true
    - job: "AI review: [cursor]"
      artifacts: true
      optional: true
    - job: "AI critique: [claude]"
      artifacts: true
      optional: true
    - job: "AI critique: [codex]"
      artifacts: true
      optional: true
    - job: "AI critique: [opencode]"
      artifacts: true
      optional: true
    - job: "AI critique: [cursor]"
      artifacts: true
      optional: true
  script:
    - python -m ai_review.consensus --config "$AI_REVIEW_CONFIG" --inputs inputs --findings-dir out/findings --critiques-dir out/critiques --out out/consensus/consensus.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/consensus/

post_ai_review:
  stage: ai_review
  extends: .ai_review_rules
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: false
  resource_group: "ai-review-mr-${CI_PROJECT_ID}-${CI_MERGE_REQUEST_IID}"
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: consensus_ai_review
      artifacts: true
  script:
    - python -m ai_review.post --config "$AI_REVIEW_CONFIG" --inputs inputs --consensus out/consensus/consensus.json --out out/post/post_result.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/post/

ai_review_gate:
  stage: ai_review
  extends: .ai_review_rules
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: false
  needs:
    - job: consensus_ai_review
      artifacts: true
    - job: post_ai_review
      artifacts: true
  script:
    - python -m ai_review.gate --config "$AI_REVIEW_CONFIG" --consensus out/consensus/consensus.json --post-result out/post/post_result.json --out out/gate/gate_result.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/gate/
