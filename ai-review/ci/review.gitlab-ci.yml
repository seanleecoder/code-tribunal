stages:
  - prepare
  - review
  - critique
  - consensus
  - post
  - gate

variables:
  # Temporary Phase 5.5 bootstrap refs. Replace all three values together with
  # public GHCR @sha256 digest refs after the first successful publish.
  AI_REVIEW_BASE_IMAGE: "$CI_REGISTRY_IMAGE:ai_review_base_1_1_3c484052e41cbe99b45339f4f4afccf72538e5b7"
  AI_REVIEW_REVIEWER_IMAGE: "$CI_REGISTRY_IMAGE:ai_review_reviewer_1_1_3c484052e41cbe99b45339f4f4afccf72538e5b7"
  AI_REVIEW_TRUSTED_IMAGE_SHA: "3c484052e41cbe99b45339f4f4afccf72538e5b7"
  AI_REVIEW_TRUSTED_ROOT: /opt/ai-review
  AI_REVIEW_CONFIG: /opt/ai-review/config/review.yaml
  PYTHONPATH: /opt/ai-review/src

.ai_review_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

prepare_ai_review:
  stage: prepare
  extends: .ai_review_rules
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: true
  script:
    - python -m ai_review.input_bundle prepare --config "$AI_REVIEW_CONFIG" --out inputs
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - inputs/
      - out/status/prepare.json

.review_template:
  stage: review
  extends: .ai_review_rules
  # Secret-bearing reviewer jobs must run adapter code and reviewer config from
  # the trusted review image/repository, not from MR-controlled code. Runtime
  # endpoint/model validation is defense in depth, not the trust boundary.
  image: "$AI_REVIEW_REVIEWER_IMAGE"
  interruptible: true
  allow_failure: true
  variables:
    AI_REVIEW_INPUT_DIR: inputs
    AI_REVIEW_OUTPUT_DIR: out
    AI_REVIEW_LOCAL_MOCK: "0"
    OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
    AI_REVIEW_REQUIRE_REAL_OPENROUTER: "1"
  needs:
    - job: prepare_ai_review
      artifacts: true
  script:
    - /opt/ai-review/adapters/run_reviewer.sh "$REVIEWER" review
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - out/findings/
      - out/status/

review_claude:
  extends: .review_template
  variables:
    REVIEWER: claude
    AI_REVIEW_REQUIRE_REAL_CLAUDE: "1"
    ANTHROPIC_BASE_URL: https://openrouter.ai/api

review_codex:
  extends: .review_template
  variables:
    REVIEWER: codex

review_opencode:
  extends: .review_template
  variables:
    REVIEWER: opencode
    AI_REVIEW_REQUIRE_REAL_OPENCODE: "1"

.critique_template:
  stage: critique
  extends: .ai_review_rules
  image: "$AI_REVIEW_REVIEWER_IMAGE"
  interruptible: true
  allow_failure: true
  variables:
    AI_REVIEW_INPUT_DIR: inputs
    AI_REVIEW_OUTPUT_DIR: out
    AI_REVIEW_LOCAL_MOCK: "0"
    OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
    AI_REVIEW_REQUIRE_REAL_OPENROUTER: "1"
  rules:
    - if: '$AI_REVIEW_CRITIQUE_ENABLED == "true"'
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: review_claude
      artifacts: true
      optional: true
    - job: review_codex
      artifacts: true
      optional: true
    - job: review_opencode
      artifacts: true
      optional: true
  script:
    - /opt/ai-review/adapters/run_reviewer.sh "$REVIEWER" critique
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - out/critiques/
      - out/pooled_findings/
      - out/status/

critique_claude:
  extends: .critique_template
  variables:
    REVIEWER: claude
    AI_REVIEW_REQUIRE_REAL_CLAUDE: "1"
    ANTHROPIC_BASE_URL: https://openrouter.ai/api

critique_codex:
  extends: .critique_template
  variables:
    REVIEWER: codex

critique_opencode:
  extends: .critique_template
  variables:
    REVIEWER: opencode
    AI_REVIEW_REQUIRE_REAL_OPENCODE: "1"

consensus_ai_review:
  stage: consensus
  extends: .ai_review_rules
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: true
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: review_claude
      artifacts: true
      optional: true
    - job: review_codex
      artifacts: true
      optional: true
    - job: review_opencode
      artifacts: true
      optional: true
    - job: critique_claude
      artifacts: true
      optional: true
    - job: critique_codex
      artifacts: true
      optional: true
    - job: critique_opencode
      artifacts: true
      optional: true
  script:
    - python -m ai_review.consensus --config "$AI_REVIEW_CONFIG" --inputs inputs --findings-dir out/findings --critiques-dir out/critiques --out out/consensus/consensus.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/consensus/
      - out/status/consensus.json

post_ai_review:
  stage: post
  extends: .ai_review_rules
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: false
  resource_group: "ai-review-mr-${CI_PROJECT_ID}-${CI_MERGE_REQUEST_IID}"
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: consensus_ai_review
      artifacts: true
  script:
    - python -m ai_review.post --config "$AI_REVIEW_CONFIG" --inputs inputs --consensus out/consensus/consensus.json --out out/post/post_result.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/post/
      - out/status/post.json

ai_review_gate:
  stage: gate
  extends: .ai_review_rules
  image: "$AI_REVIEW_BASE_IMAGE"
  interruptible: false
  needs:
    - job: consensus_ai_review
      artifacts: true
    - job: post_ai_review
      artifacts: true
  script:
    - python -m ai_review.gate --config "$AI_REVIEW_CONFIG" --consensus out/consensus/consensus.json --post-result out/post/post_result.json --out out/gate/gate_result.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/gate/
      - out/status/gate.json
