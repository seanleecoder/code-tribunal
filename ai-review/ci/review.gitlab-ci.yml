stages:
  - prepare
  - review
  - critique
  - consensus
  - post
  - gate

.ai_review_rules:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "web"'
    - if: '$CI_PIPELINE_SOURCE == "api"'

prepare_ai_review:
  stage: prepare
  extends: .ai_review_rules
  image: registry.example.com/ai-review/base:1.1
  interruptible: true
  script:
    - python -m ai_review.input_bundle prepare --config ai-review/config/review.yaml --out inputs
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - inputs/
      - out/status/prepare.json

.review_template:
  stage: review
  extends: .ai_review_rules
  # Secret-bearing reviewer jobs must run adapter code and reviewer config from
  # the trusted review image/repository, not from MR-controlled code. Runtime
  # endpoint/model validation is defense in depth, not the trust boundary.
  image: registry.example.com/ai-review/reviewer:1.1
  interruptible: true
  allow_failure: true
  variables:
    AI_REVIEW_CONFIG: ai-review/config/review.yaml
    AI_REVIEW_INPUT_DIR: inputs
    AI_REVIEW_OUTPUT_DIR: out
    OPENROUTER_BASE_URL: https://openrouter.ai/api/v1
    AI_REVIEW_REQUIRE_REAL_OPENROUTER: "1"
  needs:
    - job: prepare_ai_review
      artifacts: true
  script:
    - ./ai-review/adapters/run_reviewer.sh "$REVIEWER" review
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - out/findings/
      - out/status/

review_claude:
  extends: .review_template
  variables:
    REVIEWER: claude
    AI_REVIEW_REQUIRE_REAL_CLAUDE: "1"
    AI_REVIEW_LOCAL_MOCK: "0"
    ANTHROPIC_BASE_URL: https://openrouter.ai/api

review_codex:
  extends: .review_template
  variables:
    REVIEWER: codex

review_antigravity:
  extends: .review_template
  variables:
    REVIEWER: antigravity

.critique_template:
  stage: critique
  extends: .ai_review_rules
  image: registry.example.com/ai-review/reviewer:1.1
  interruptible: true
  allow_failure: true
  variables:
    AI_REVIEW_CONFIG: ai-review/config/review.yaml
    AI_REVIEW_INPUT_DIR: inputs
    AI_REVIEW_OUTPUT_DIR: out
  rules:
    - if: '$AI_REVIEW_CRITIQUE_ENABLED == "true"'
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: review_claude
      artifacts: true
      optional: true
    - job: review_codex
      artifacts: true
      optional: true
    - job: review_antigravity
      artifacts: true
      optional: true
  script:
    - ./ai-review/adapters/run_reviewer.sh "$REVIEWER" critique
  artifacts:
    when: always
    expire_in: 7 days
    paths:
      - out/critiques/
      - out/status/

critique_claude:
  extends: .critique_template
  variables:
    REVIEWER: claude

critique_codex:
  extends: .critique_template
  variables:
    REVIEWER: codex

critique_antigravity:
  extends: .critique_template
  variables:
    REVIEWER: antigravity

consensus_ai_review:
  stage: consensus
  extends: .ai_review_rules
  image: registry.example.com/ai-review/base:1.1
  interruptible: true
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: review_claude
      artifacts: true
      optional: true
    - job: review_codex
      artifacts: true
      optional: true
    - job: review_antigravity
      artifacts: true
      optional: true
    - job: critique_claude
      artifacts: true
      optional: true
    - job: critique_codex
      artifacts: true
      optional: true
    - job: critique_antigravity
      artifacts: true
      optional: true
  script:
    - python -m ai_review.consensus --config ai-review/config/review.yaml --inputs inputs --out out/consensus/consensus.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/consensus/
      - out/status/consensus.json

post_ai_review:
  stage: post
  extends: .ai_review_rules
  image: registry.example.com/ai-review/base:1.1
  interruptible: false
  resource_group: "ai-review-mr-${CI_PROJECT_ID}-${CI_MERGE_REQUEST_IID}"
  needs:
    - job: prepare_ai_review
      artifacts: true
    - job: consensus_ai_review
      artifacts: true
  script:
    - python -m ai_review.post --config ai-review/config/review.yaml --inputs inputs --consensus out/consensus/consensus.json --out out/post/post_result.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/post/
      - out/status/post.json

ai_review_gate:
  stage: gate
  extends: .ai_review_rules
  image: registry.example.com/ai-review/base:1.1
  interruptible: false
  needs:
    - job: consensus_ai_review
      artifacts: true
    - job: post_ai_review
      artifacts: true
  script:
    - python -m ai_review.gate --config ai-review/config/review.yaml --consensus out/consensus/consensus.json --post-result out/post/post_result.json --out out/gate/gate_result.json
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - out/gate/
      - out/status/gate.json
