schema_version: review_config.v1 # Schema version for config compatibility validation (must be review_config.v1)

# Configured LLM reviewer backends.
# Per-reviewer `model` and `enabled` can be overridden at runtime without a
# rebuild via AI_REVIEW_<REVIEWER>_MODEL / AI_REVIEW_<REVIEWER>_ENABLED
# (e.g. AI_REVIEW_CLAUDE_MODEL, AI_REVIEW_CODEX_ENABLED). See README "Runtime
# Environment Overrides".
reviewers:
  claude:
    enabled: true # Override: AI_REVIEW_CLAUDE_ENABLED
    adapter: adapters/claude.sh # Shell wrapper script executing the reviewer CLI
    model: claude-haiku-4.5 # Model identifier passed to CLI adapter (override: AI_REVIEW_CLAUDE_MODEL)
    effort: medium # Reasoning/exploration effort for the claude CLI (low|medium|high|xhigh|max). Voluntary stopping, not a turn cap — timeout_seconds stays the hang-catch. Override: AI_REVIEW_CLAUDE_EFFORT
    timeout_seconds: 600 # Execution timeout per reviewer job (10 min: rooted agentic exploration converges in ~5 min, so this is headroom that still catches a hang ~3x faster than the old 1800; review and critique are separate jobs, so worst-case wall-clock is ~2x this per reviewer)
    # No turn cap: Claude runs its agentic loop to completion, bounded by
    # timeout_seconds as the hang-catch. A hard-coded low cap made stronger,
    # more exploratory models stop before emitting findings.
    max_findings: 50 # Cap on raw findings emitted before consensus filtering
    credential_variable: ANTHROPIC_API_KEY # Environment variable holding provider API token. Note: on the OpenRouter route the adapter blanks this and authenticates via ANTHROPIC_AUTH_TOKEN mapped from OPENROUTER_API_KEY (see adapters/claude.sh); this variable is used for direct-Anthropic runs.
  codex:
    enabled: true # Override: AI_REVIEW_CODEX_ENABLED
    adapter: adapters/codex.sh # Shell wrapper script executing the reviewer CLI
    model: openai/gpt-5.4-mini # Model identifier passed to CLI adapter (override: AI_REVIEW_CODEX_MODEL)
    # Optional reasoning effort: low|medium|high|xhigh reaches Codex unchanged
    # as model_reasoning_effort. Claude-only max leaves the Codex provider
    # default unchanged. Override: AI_REVIEW_CODEX_EFFORT
    timeout_seconds: 600 # Execution timeout per reviewer job (10 min: rooted agentic exploration converges in ~5 min, so this is headroom that still catches a hang ~3x faster than the old 1800; review and critique are separate jobs, so worst-case wall-clock is ~2x this per reviewer)
    max_findings: 50 # Cap on raw findings emitted before consensus filtering
    credential_variable: OPENROUTER_API_KEY # Environment variable holding provider API token
  opencode:
    enabled: true # Override: AI_REVIEW_OPENCODE_ENABLED
    adapter: adapters/opencode.sh # Shell wrapper script executing the reviewer CLI
    model: google/gemini-3.1-flash-lite # Model identifier passed to CLI adapter (override: AI_REVIEW_OPENCODE_MODEL)
    # Optional effort/reasoning depth: low|medium|high reaches opencode as
    # reasoningEffort. Leave it (or use Claude-only xhigh/max) unset here for
    # the provider default; once SPEC-20 usage data is available, low is the
    # recommended starting point for flash-class models. Override:
    # AI_REVIEW_OPENCODE_EFFORT
    timeout_seconds: 600 # Execution timeout per reviewer job (10 min: rooted agentic exploration converges in ~5 min, so this is headroom that still catches a hang ~3x faster than the old 1800; review and critique are separate jobs, so worst-case wall-clock is ~2x this per reviewer)
    max_findings: 50 # Cap on raw findings emitted before consensus filtering
    credential_variable: OPENROUTER_API_KEY # Environment variable holding provider API token

  # Cursor is an opt-in substitute reviewer. Cursor CLI cannot route through
  # OpenRouter/BYOK/custom-base-URL; enabling it sends review prompts, diffs,
  # and any repo snapshot content it reads to Cursor's backend as a deliberate
  # second egress destination. Substitute opencode with:
  # AI_REVIEW_CURSOR_ENABLED=true, AI_REVIEW_OPENCODE_ENABLED=false, and a
  # CURSOR_API_KEY secret. Do not use OPENROUTER_API_KEY for this reviewer.
  cursor:
    enabled: false # Opt-in substitute for opencode. Override: AI_REVIEW_CURSOR_ENABLED
    adapter: adapters/cursor.sh
    model: auto # Cursor Composer model id; verify current id via `cursor-agent models`. Override: AI_REVIEW_CURSOR_MODEL
    timeout_seconds: 600
    max_findings: 50
    credential_variable: CURSOR_API_KEY # Cursor account/service key — NOT OpenRouter

# Panel voting and consensus aggregation rules
panel:
  min_successful_reviewers_for_blocking: 2 # Minimum successful reviewer runs required to issue a merge-blocking verdict
  min_successful_reviewers_for_resolution: 2 # Minimum successful reviewer runs required to resolve findings across runs
  quorum:
    votes_required: 2 # Minimum agreeing votes required across reviewers to reach consensus
  grouping:
    semantic:
      enabled: false # Deterministic title/body similarity grouping; kept opt-in until calibrated on fixtures
      threshold: 0.5 # Jaccard threshold over normalized word and 3-word shingles

# Severity rules governing MR merge blocking and consensus requirements
severity_policy:
  single_reviewer_blocker:
    categories: [security, correctness] # Finding categories eligible for single-reviewer blocker reporting
  quorum_blocker:
    block_merge: true # Block MR merge when consensus quorum agrees on a blocker finding

# Optional multi-agent cross-examination phase (critique)
critique:
  enabled: true # Override: AI_REVIEW_CRITIQUE_ENABLED (strict true/false; same var gates the CI critique jobs, default "true" in the CI template — single source of truth)
  rounds: 1 # Current critique round count (must be 1 for critique to affect consensus)
  max_rounds: 1 # Reserved for future multi-round critique; not consumed by v1 logic (which activates critique only when rounds == 1)
  blind_reviewer_identity: true # Anonymize reviewer identities during critique to prevent model bias
  can_add_quorum_votes: false # Must be false in v1 schema
  allow_advisory_escalation: true # Surface peer-supported advisory findings; escalation remains non-blocking
  allow_severity_downgrade: false # Security default: downgrades are opt-in and never cross blocker boundary

# Placement and formatting rules for MR inline comments & summaries
posting:
  mode: gitlab_discussions # Integration backend target for discussions; set github_reviews with state.backend=github_pr_comment for GitHub Actions
  v1_inline_sides: [new, old, unchanged] # Allowed diff context sides for inline thread placement
  inline_multiline: true # Support multiline diff range comments
  fallback_to_summary_comment: true # Post to general MR summary comment if inline diff matching fails
  fyi_mode: summary_comment # Location for non-blocking advisory findings ('summary_comment' groups in summary note)
  stale_head_guard: true # Abort posting if MR commit HEAD changes during job execution

# Merge gating integration rules
merge_gate:
  enabled: true # Override: AI_REVIEW_MERGE_GATE_ENABLED (set false for advisory, non-blocking mode)

# Persistent state management across pipeline runs
state:
  backend: gitlab_mr_state_note # Storage backend (hidden note on GitLab MR); use github_pr_comment with posting.mode=github_reviews
  recover_from_discussion_markers: true # Reconstruct state from inline comments if state note is lost or corrupted
  checksum_required: true # Require SHA256 integrity check on state note content
  retention:
    keep_open: true # Preserve state records for open findings
    keep_wontfix: true # Preserve state records marked as won't fix
    keep_resolved_runs: 5 # Number of past pipeline runs to retain resolved findings history
    keep_superseded_runs: 2 # Retention depth for superseded run records
    keep_stale_runs: 2 # Retention depth for stale/stale_unverified records
    max_records: 200 # Max state entry count
    max_state_bytes: 50000 # Max byte size for state payload note
    overflow_behavior: fail_closed # Documents intent; the write path is unconditionally fail-closed in code (post reports state_overflow and the gate exits non-zero) regardless of this value. Note: the state-load guard reads top-level state.overflow_behavior, not this retention-scoped key.

# Safety limits for diff size, findings, and prompts
limits:
  max_diff_bytes: 250000 # Max git diff payload size in bytes accepted for review
  max_files: 200 # Max number of changed files analyzed per review run
  max_posted_surface_findings: 25 # Limit on inline posted comments to prevent MR thread spam
  max_fyi_findings: 50 # Cap on non-blocking findings in MR summary comment
  max_prompt_bytes: 500000 # Max prompt payload size in bytes sent to model APIs

# Runtime security controls
security:
  allow_external_fork_secrets: false # Block secret environment variables on external fork pipelines
